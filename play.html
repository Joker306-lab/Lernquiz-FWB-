<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Quiz spielen</title>
  <link rel="stylesheet" href="play.css">
</head>
<body>
  <main class="page-shell">
    <section class="top-card">
      <div class="head-row">
        <a href="quiz.html" class="back-link">‹ Zur Übersicht</a>
        <div class="mode-pill" id="modePill">Lernmodus</div>
      </div>
      <div class="title-row">
        <div>
          <p class="eyebrow colorful" id="categoryEyebrow">Kategorie</p>
          <h1 id="categoryTitle">Quiz</h1>
        </div>
        <div class="highscore-box">
          <span>Highscore</span>
          <strong id="highscoreValue">0</strong>
        </div>
      </div>
      <div class="progress-label-row">
        <span id="progressLabel">Fortschritt</span>
        <span id="progressText">0 / 0</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="stats-grid">
        <div class="stat-chip"><span>Punkte</span><strong id="scoreValue">0</strong></div>
        <div class="stat-chip"><span>Direkt richtig</span><strong id="directValue">0</strong></div>
        <div class="stat-chip"><span>Später richtig</span><strong id="repeatValue">0</strong></div>
        <div class="stat-chip"><span>Falsch</span><strong id="wrongValue">0</strong></div>
        <div class="stat-chip"><span>Zeit abgelaufen</span><strong id="timeoutValue">0</strong></div>
        <div class="stat-chip"><span>Joker</span><strong id="jokerValue">verfügbar</strong></div>
      </div>
    </section>

    <section class="question-card">
      <div class="question-meta" id="questionMeta">Frage 1</div>
      <h2 class="question-text" id="questionText"></h2>
      <div class="answers" id="answers"></div>
      <div class="action-row">
        <button id="jokerBtn" class="joker-wide" type="button">
          <span class="joker-icon-wrap" aria-hidden="true">
            <span class="hat-icon">
              <span class="hat-top"></span>
              <span class="hat-band"></span>
              <span class="hat-brim"></span>
            </span>
          </span>
          <span class="joker-text">Joker einsetzen</span>
        </button>
        <div class="timer-pill"><span id="timer">25</span>s</div>
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn hidden" id="nextBtn" type="button">Weiter</button>
    </section>
  </main>

  
<footer class="site-footer">
  <a href="impressum.html">Impressum</a>
  <span class="separator">·</span>
  <a href="datenschutz.html">Datenschutz</a>
  <span class="separator">·</span>
  <span>© Notfallpflege Quiz Alvarez</span>
</footer>


  <script src="question-bank.js"></script>
  <script src="quiz-audio.js"></script>
  <script src="play.js"></script>
</body>
</html>
