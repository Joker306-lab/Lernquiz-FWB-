<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>xABCDE Quiz</title>
  <link rel="stylesheet" href="xabcde.css">
</head>
<body>
  <main class="page-shell">
    <section class="quiz-top">
      <a href="quiz.html" class="back-link">‹ Zurück</a>
      <p class="eyebrow colorful">xABCDE</p>
      <h1>Wissen trainieren im xABCDE Schema</h1>
      <p class="lead">Die Datenstruktur ist so vorbereitet, dass du Fragen pro Kategorie später einfach ergänzen kannst, ohne dass das Design oder die Logik kollabieren.</p>
    </section>

    <section class="status-card">
      <div class="status-row">
        <span class="status-label">Fortschritt</span>
        <span class="status-label"><span id="currentCount">0</span> / 100</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="status-row lower">
        <span class="timer-pill"><span id="timer">25</span>s</span>
      </div>
    </section>

    <section class="question-card">
      <div class="question-meta" id="questionMeta">Frage 1</div>
      <h2 class="question-text" id="questionText"></h2>

      <div class="answers" id="answers"></div>

      <button id="jokerBtn" class="joker-wide" type="button">
        <span class="joker-icon-wrap" aria-hidden="true">
          <span class="hat-icon">
            <span class="hat-top"></span>
            <span class="hat-band"></span>
            <span class="hat-brim"></span>
          </span>
        </span>
        <span class="joker-text">Joker einsetzen</span>
      </button>

      <div class="feedback" id="feedback"></div>
      <button class="next-btn hidden" id="nextBtn" type="button">Weiter</button>
    </section>
  </main>

  <footer class="site-footer">
    <a href="impressum.html">Impressum</a>
  </footer>

  <script src="quiz-audio.js"></script>
  <script src="xabcde-questions.js"></script>
  <script src="xabcde.js"></script>
</body>
</html>
