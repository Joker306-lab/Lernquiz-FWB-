<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Impressum</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      background:radial-gradient(circle at top, rgba(255,255,255,.98), rgba(245,245,247,1) 44%, rgba(238,241,248,1) 100%);
      color:#1f2a44;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    main{
      width:min(100%,860px);
      margin:0 auto;
      padding:32px 18px 60px;
    }
    .card{
      border-radius:34px;
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
      box-shadow:0 20px 40px rgba(15,23,42,.06), inset 0 1px 0 rgba(255,255,255,.75);
      padding:26px 22px;
    }
    h1{
      margin:0 0 16px;
      font-size:clamp(34px,5vw,56px);
      line-height:1.02;
      letter-spacing:-.05em;
      font-weight:800;
      background:linear-gradient(90deg,#0f172a 0%,#2563ff 22%,#7c3aed 52%,#ec4899 76%,#f59e0b 100%);
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    p{
      margin:0 0 14px;
      font-size:clamp(16px,2.1vw,20px);
      line-height:1.55;
      color:rgba(31,42,68,.76);
    }
    a{color:#0a84ff;text-decoration:none}
    .back{
      display:inline-block;
      margin-top:10px;
      font-weight:700;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Impressum</h1>
      <p>Verantwortlich für Inhalt und Pflege dieses Lernquiz:</p>
      <p>Nikeair187<br>E-Mail: <a href="mailto:Nikeair187@outlook.de">Nikeair187@outlook.de</a></p>
      <p>Dieses Projekt dient der spielerischen Unterhaltung und dem allgemeinen Wiederholen von Lerninhalten.</p>
      <a class="back" href="index.html">Zurück zur Startseite</a>
    </section>
  </main>
</body>
</html>
