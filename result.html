<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ergebnis</title>
  <link rel="stylesheet" href="result.css">
</head>
<body>
  <main class="page-shell">
    <section class="result-card">
      <p class="eyebrow">ABSCHLUSSÜBERSICHT</p>
      <h1 id="resultTitle">Ergebnis</h1>
      <p class="summary" id="resultSummary"></p>

      <div class="hero-metrics">
        <div class="metric large"><span>Punkte</span><strong id="scoreValue">0</strong></div>
        <div class="metric large"><span>Prozent</span><strong id="percentValue">0%</strong></div>
        <div class="metric large"><span>Highscore</span><strong id="highscoreValue">0</strong></div>
      </div>

      <div class="detail-grid">
        <div class="metric"><span>Gesamtfragen</span><strong id="totalValue">0</strong></div>
        <div class="metric"><span>Direkt richtig</span><strong id="directValue">0</strong></div>
        <div class="metric"><span>Später richtig</span><strong id="repeatValue">0</strong></div>
        <div class="metric"><span>Falsch</span><strong id="wrongValue">0</strong></div>
        <div class="metric"><span>Zeit abgelaufen</span><strong id="timeoutValue">0</strong></div>
        <div class="metric"><span>Joker benutzt</span><strong id="jokerValue">0</strong></div>
      </div>

      <div class="rating-box" id="ratingBox">Solide</div>

      <div class="button-row">
        <a href="quiz.html" class="secondary-button">Zur Übersicht</a>
        <a href="#" class="primary-button" id="replayButton">Nochmal spielen</a>
      </div>
    </section>
  </main>

  
<footer class="site-footer">
  <a href="impressum.html">Impressum</a>
  <span class="separator">·</span>
  <span>© Notfallpflege Quiz Alvarez</span>
</footer>


  <script src="result.js"></script>
</body>
</html>
