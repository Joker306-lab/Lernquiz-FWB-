<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Quiz</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: #f5f5f7;
      color: #111;
    }
    body {
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    h2 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
    }
    p {
      margin: 12px 0 0;
      color: rgba(17,17,17,0.6);
      font-size: clamp(16px, 2.2vw, 22px);
    }
  </style>
</head>
<body>
  <div>
    <h2>Quiz startet hier</h2>
    <p>Die zweite Seite bauen wir als Nächstes sauber auf.</p>
  </div>
</body>
</html>
